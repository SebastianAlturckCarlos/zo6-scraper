name: Corvette Z06 deal scraper

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Find new listings and send alert
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TARGET_EMAIL: ${{ secrets.TARGET_EMAIL }}
          # Optional: set this secret to a residential proxy URL to reach sources
          # (e.g. Cars.com) that block GitHub's datacenter IPs. Left unset, the
          # scraper runs fine on the sources that do not IP-block CI.
          SCRAPER_PROXY: ${{ secrets.SCRAPER_PROXY }}
        run: python scraper.py

      - name: Save updated lowest price
        run: |
          if [ -z "$(git status --porcelain -- lowest_price.json)" ]; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lowest_price.json
          git commit -m "chore: update lowest Corvette Z06 price"
          git push
